stages:
  - lint
  - test
  - build
  - deploy

# Imagem base padrão para os jobs de Node.js
image: node:20-alpine

# Configuração de Cache (Critério Bônus do PDF para acelerar builds)
cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

# O before_script roda antes de cada job, garantindo que as dependências existam
before_script:
  - npm ci --cache .npm --prefer-offline

# ==========================================
# STAGE: LINT
# ==========================================
lint_job:
  stage: lint
  script:
    - npm run lint

# ==========================================
# STAGE: TEST
# ==========================================
test_job:
  stage: test
  script:
    - npm run test

# ==========================================
# STAGE: BUILD (Docker & Registry)
# ==========================================
build_job:
  stage: build
  # Precisamos da imagem Docker in Docker (dind) para rodar comandos docker no runner
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Autenticação usando as variáveis automáticas (Critério obrigatório do PDF)
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

# ==========================================
# STAGE: DEPLOY
# ==========================================
deploy_job:
  stage: deploy
  # Imagem super leve só pra rodar o echo
  image: alpine:latest
  # Sobrescrevemos o before_script global para não tentar rodar npm install aqui
  before_script: []
  script:
    - echo "Iniciando deploy simulado na AWS ECS..."
    - echo "aws ecs update-service --cluster meu-cluster --service scraper-service --force-new-deployment"
    - echo "Deploy finalizado com sucesso!"
  rules:
    # Regra estrita pedida no PDF: só roda deploy se for na branch main
    - if: $CI_COMMIT_BRANCH == "main"
